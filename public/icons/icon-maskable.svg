<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1E34"/>
      <stop offset="100%" stop-color="#081220"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#122842" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#0088A3"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>
    <!-- Frame bevel gradients -->
    <linearGradient id="frameOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#24506E"/>
      <stop offset="50%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#122A44"/>
    </linearGradient>
    <linearGradient id="frameInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#265878"/>
      <stop offset="50%" stop-color="#1E4D6E"/>
      <stop offset="100%" stop-color="#163D5A"/>
    </linearGradient>
    <!-- Node bevel — top-left light source -->
    <radialGradient id="nodeHL" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#1A3050"/>
      <stop offset="100%" stop-color="#060D18"/>
    </radialGradient>
    <!-- Core glow gradients -->
    <radialGradient id="coreGlow">
      <stop offset="0%" stop-color="#4DF0FF"/>
      <stop offset="60%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B8D4"/>
    </radialGradient>
    <radialGradient id="coreTeal">
      <stop offset="0%" stop-color="#33D6E5"/>
      <stop offset="60%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </radialGradient>
    <!-- Seal bar gradient -->
    <linearGradient id="sealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#00BCD4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0.3"/>
    </linearGradient>
    <!-- Subtle shadow filters -->
    <filter id="nodeShadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="hubShadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="hubGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00BCD4" flood-opacity="0.15"/>
    </filter>
    <filter id="lineGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00BCD4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Full bleed background for maskable -->
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGlow)"/>

  <!-- All content within maskable safe zone (~200px inset) -->

  <!-- Outer container frame with bevel -->
  <rect x="248" y="248" width="528" height="528" rx="48" ry="48"
        fill="none" stroke="#102030" stroke-width="24"/>
  <rect x="248" y="248" width="528" height="528" rx="48" ry="48"
        fill="none" stroke="url(#frameOuter)" stroke-width="22"/>

  <!-- Inner container frame with bevel -->
  <rect x="292" y="292" width="440" height="440" rx="28" ry="28"
        fill="none" stroke="#0C1C30" stroke-width="10"/>
  <rect x="292" y="292" width="440" height="440" rx="28" ry="28"
        fill="none" stroke="url(#frameInner)" stroke-width="8"/>

  <!-- Network bus lines (recessed) -->
  <line x1="348" y1="432" x2="676" y2="432" stroke="#0A2840" stroke-width="8" stroke-linecap="round"/>
  <line x1="348" y1="512" x2="676" y2="512" stroke="#0A2840" stroke-width="8" stroke-linecap="round"/>
  <line x1="348" y1="592" x2="676" y2="592" stroke="#0A2840" stroke-width="8" stroke-linecap="round"/>
  <line x1="512" y1="348" x2="512" y2="676" stroke="#0A2840" stroke-width="8" stroke-linecap="round"/>

  <!-- Active circuit lines with glow -->
  <g filter="url(#lineGlow)">
    <line x1="388" y1="432" x2="636" y2="432" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
    <line x1="388" y1="512" x2="636" y2="512" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
    <line x1="388" y1="592" x2="636" y2="592" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
    <line x1="512" y1="388" x2="512" y2="636" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- Branch lines -->
  <line x1="432" y1="432" x2="432" y2="592" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
  <line x1="592" y1="432" x2="592" y2="592" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.85"/>

  <!-- Top/bottom nodes with depth -->
  <g filter="url(#nodeShadow)">
    <circle cx="512" cy="380" r="22" fill="url(#nodeHL)" stroke="url(#glow)" stroke-width="6"/>
    <circle cx="512" cy="380" r="9" fill="url(#coreGlow)"/>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="512" cy="644" r="22" fill="url(#nodeHL)" stroke="url(#glow)" stroke-width="6"/>
    <circle cx="512" cy="644" r="9" fill="url(#coreGlow)"/>
  </g>

  <!-- Side nodes with depth -->
  <g filter="url(#nodeShadow)">
    <circle cx="388" cy="432" r="18" fill="url(#nodeHL)" stroke="url(#accent)" stroke-width="6"/>
    <circle cx="388" cy="432" r="7" fill="url(#coreTeal)"/>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="636" cy="432" r="18" fill="url(#nodeHL)" stroke="url(#accent)" stroke-width="6"/>
    <circle cx="636" cy="432" r="7" fill="url(#coreTeal)"/>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="388" cy="592" r="18" fill="url(#nodeHL)" stroke="url(#accent)" stroke-width="6"/>
    <circle cx="388" cy="592" r="7" fill="url(#coreTeal)"/>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="636" cy="592" r="18" fill="url(#nodeHL)" stroke="url(#accent)" stroke-width="6"/>
    <circle cx="636" cy="592" r="7" fill="url(#coreTeal)"/>
  </g>

  <!-- Central hub with shadow + glow -->
  <g filter="url(#hubShadow)">
    <circle cx="512" cy="512" r="34" fill="url(#nodeHL)"/>
  </g>
  <g filter="url(#hubGlow)">
    <circle cx="512" cy="512" r="32" fill="url(#nodeHL)" stroke="url(#glow)" stroke-width="8"/>
    <circle cx="512" cy="512" r="14" fill="url(#coreGlow)"/>
    <circle cx="506" cy="506" r="5" fill="#4DF0FF" opacity="0.2"/>
  </g>

  <!-- Junction nodes with depth -->
  <g filter="url(#nodeShadow)">
    <circle cx="432" cy="432" r="11" fill="url(#nodeHL)" stroke="#0088A3" stroke-width="4"/>
    <circle cx="432" cy="432" r="4" fill="url(#coreTeal)"/>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="592" cy="432" r="11" fill="url(#nodeHL)" stroke="#0088A3" stroke-width="4"/>
    <circle cx="592" cy="432" r="4" fill="url(#coreTeal)"/>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="432" cy="592" r="11" fill="url(#nodeHL)" stroke="#0088A3" stroke-width="4"/>
    <circle cx="432" cy="592" r="4" fill="url(#coreTeal)"/>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="592" cy="592" r="11" fill="url(#nodeHL)" stroke="#0088A3" stroke-width="4"/>
    <circle cx="592" cy="592" r="4" fill="url(#coreTeal)"/>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="432" cy="512" r="11" fill="url(#nodeHL)" stroke="#0088A3" stroke-width="4"/>
    <circle cx="432" cy="512" r="4" fill="url(#coreTeal)"/>
  </g>
  <g filter="url(#nodeShadow)">
    <circle cx="592" cy="512" r="11" fill="url(#nodeHL)" stroke="#0088A3" stroke-width="4"/>
    <circle cx="592" cy="512" r="4" fill="url(#coreTeal)"/>
  </g>

  <!-- Vault seal accent with gradient -->
  <rect x="408" y="260" width="208" height="10" rx="5" fill="url(#sealGrad)"/>
  <rect x="424" y="260" width="176" height="3" rx="1.5" fill="#fff" opacity="0.06"/>
</svg>
