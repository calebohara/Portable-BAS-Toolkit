<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient with subtle radial depth -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1E34"/>
      <stop offset="100%" stop-color="#081220"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#122842" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>

    <!-- Accent gradients -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#0088A3"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00BCD4"/>
    </linearGradient>

    <!-- Frame bevel gradients -->
    <linearGradient id="frameOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#24506E"/>
      <stop offset="50%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#122A44"/>
    </linearGradient>
    <linearGradient id="frameInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#265878"/>
      <stop offset="50%" stop-color="#1E4D6E"/>
      <stop offset="100%" stop-color="#163D5A"/>
    </linearGradient>

    <!-- Node bevel — top-left light source -->
    <radialGradient id="nodeHighlight" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#1A3050" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060D18" stop-opacity="1"/>
    </radialGradient>

    <!-- Glow core gradient for large nodes -->
    <radialGradient id="coreGlow">
      <stop offset="0%" stop-color="#4DF0FF"/>
      <stop offset="60%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B8D4"/>
    </radialGradient>
    <radialGradient id="coreTeal">
      <stop offset="0%" stop-color="#33D6E5"/>
      <stop offset="60%" stop-color="#00BCD4"/>
      <stop offset="100%" stop-color="#0097A7"/>
    </radialGradient>

    <!-- Subtle ambient shadow filter -->
    <filter id="nodeShadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="hubShadow" x="-30%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="hubGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00BCD4" flood-opacity="0.15"/>
    </filter>

    <!-- Seal bar gradient -->
    <linearGradient id="sealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#00BCD4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0.3"/>
    </linearGradient>

    <!-- Line depth glow -->
    <filter id="lineGlow" x="-10%" y="-40%" width="120%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#00BCD4" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background rounded square with depth -->
  <rect x="0" y="0" width="1024" height="1024" rx="208" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="208" fill="url(#bgGlow)"/>

  <!-- Outer container frame — vault shell with bevel -->
  <rect x="152" y="152" width="720" height="720" rx="64" ry="64"
        fill="none" stroke="#102030" stroke-width="32"/>
  <rect x="152" y="152" width="720" height="720" rx="64" ry="64"
        fill="none" stroke="url(#frameOuter)" stroke-width="28"/>

  <!-- Inner container frame with bevel -->
  <rect x="208" y="208" width="608" height="608" rx="40" ry="40"
        fill="none" stroke="#0C1C30" stroke-width="14"/>
  <rect x="208" y="208" width="608" height="608" rx="40" ry="40"
        fill="none" stroke="url(#frameInner)" stroke-width="12"/>

  <!-- Horizontal network bus lines (recessed) -->
  <line x1="280" y1="400" x2="744" y2="400" stroke="#0A2840" stroke-width="10" stroke-linecap="round"/>
  <line x1="280" y1="512" x2="744" y2="512" stroke="#0A2840" stroke-width="10" stroke-linecap="round"/>
  <line x1="280" y1="624" x2="744" y2="624" stroke="#0A2840" stroke-width="10" stroke-linecap="round"/>

  <!-- Vertical network trunk (recessed) -->
  <line x1="512" y1="300" x2="512" y2="724" stroke="#0A2840" stroke-width="10" stroke-linecap="round"/>

  <!-- Active circuit lines — horizontal with glow -->
  <g filter="url(#lineGlow)">
    <line x1="340" y1="400" x2="684" y2="400" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <line x1="340" y1="512" x2="684" y2="512" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
    <line x1="340" y1="624" x2="684" y2="624" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Active circuit lines — vertical trunk with glow -->
  <g filter="url(#lineGlow)">
    <line x1="512" y1="340" x2="512" y2="684" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Vertical branch lines to nodes -->
  <line x1="400" y1="400" x2="400" y2="512" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <line x1="624" y1="400" x2="624" y2="512" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <line x1="400" y1="512" x2="400" y2="624" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
  <line x1="624" y1="512" x2="624" y2="624" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" opacity="0.85"/>

  <!-- Network nodes — large (controllers) with depth -->
  <g filter="url(#nodeShadow)">
    <circle cx="512" cy="340" r="28" fill="url(#nodeHighlight)" stroke="url(#glow)" stroke-width="8"/>
    <circle cx="512" cy="340" r="12" fill="url(#coreGlow)"/>
  </g>

  <g filter="url(#nodeShadow)">
    <circle cx="512" cy="684" r="28" fill="url(#nodeHighlight)" stroke="url(#glow)" stroke-width="8"/>
    <circle cx="512" cy="684" r="12" fill="url(#coreGlow)"/>
  </g>

  <!-- Network nodes — medium (panels) with depth -->
  <g filter="url(#nodeShadow)">
    <circle cx="340" cy="400" r="22" fill="url(#nodeHighlight)" stroke="url(#accent)" stroke-width="7"/>
    <circle cx="340" cy="400" r="9" fill="url(#coreTeal)"/>
  </g>

  <g filter="url(#nodeShadow)">
    <circle cx="684" cy="400" r="22" fill="url(#nodeHighlight)" stroke="url(#accent)" stroke-width="7"/>
    <circle cx="684" cy="400" r="9" fill="url(#coreTeal)"/>
  </g>

  <g filter="url(#nodeShadow)">
    <circle cx="340" cy="624" r="22" fill="url(#nodeHighlight)" stroke="url(#accent)" stroke-width="7"/>
    <circle cx="340" cy="624" r="9" fill="url(#coreTeal)"/>
  </g>

  <g filter="url(#nodeShadow)">
    <circle cx="684" cy="624" r="22" fill="url(#nodeHighlight)" stroke="url(#accent)" stroke-width="7"/>
    <circle cx="684" cy="624" r="9" fill="url(#coreTeal)"/>
  </g>

  <!-- Central hub node — larger, brighter, with shadow + glow -->
  <g filter="url(#hubShadow)">
    <circle cx="512" cy="512" r="42" fill="url(#nodeHighlight)"/>
  </g>
  <g filter="url(#hubGlow)">
    <circle cx="512" cy="512" r="40" fill="url(#nodeHighlight)" stroke="url(#glow)" stroke-width="10"/>
    <circle cx="512" cy="512" r="18" fill="url(#coreGlow)"/>
    <!-- Subtle top-left highlight on hub -->
    <circle cx="504" cy="504" r="6" fill="#4DF0FF" opacity="0.2"/>
  </g>

  <!-- Corner junction nodes — small, with micro-depth -->
  <g filter="url(#nodeShadow)">
    <circle cx="400" cy="400" r="14" fill="url(#nodeHighlight)" stroke="#0088A3" stroke-width="5"/>
    <circle cx="400" cy="400" r="5" fill="url(#coreTeal)"/>
  </g>

  <g filter="url(#nodeShadow)">
    <circle cx="624" cy="400" r="14" fill="url(#nodeHighlight)" stroke="#0088A3" stroke-width="5"/>
    <circle cx="624" cy="400" r="5" fill="url(#coreTeal)"/>
  </g>

  <g filter="url(#nodeShadow)">
    <circle cx="400" cy="624" r="14" fill="url(#nodeHighlight)" stroke="#0088A3" stroke-width="5"/>
    <circle cx="400" cy="624" r="5" fill="url(#coreTeal)"/>
  </g>

  <g filter="url(#nodeShadow)">
    <circle cx="624" cy="624" r="14" fill="url(#nodeHighlight)" stroke="#0088A3" stroke-width="5"/>
    <circle cx="624" cy="624" r="5" fill="url(#coreTeal)"/>
  </g>

  <g filter="url(#nodeShadow)">
    <circle cx="400" cy="512" r="14" fill="url(#nodeHighlight)" stroke="#0088A3" stroke-width="5"/>
    <circle cx="400" cy="512" r="5" fill="url(#coreTeal)"/>
  </g>

  <g filter="url(#nodeShadow)">
    <circle cx="624" cy="512" r="14" fill="url(#nodeHighlight)" stroke="#0088A3" stroke-width="5"/>
    <circle cx="624" cy="512" r="5" fill="url(#coreTeal)"/>
  </g>

  <!-- Top edge accent bar — vault "seal" with gradient polish -->
  <rect x="360" y="168" width="304" height="12" rx="6" fill="url(#sealGrad)"/>
  <!-- Seal highlight edge -->
  <rect x="380" y="168" width="264" height="4" rx="2" fill="#fff" opacity="0.06"/>
</svg>
