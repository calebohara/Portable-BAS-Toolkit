<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0E1E34"/>
      <stop offset="100%" stop-color="#081220"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="0.35" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#122842" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frameBevel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#24506E"/>
      <stop offset="50%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#122A44"/>
    </linearGradient>
    <radialGradient id="nodeHL" cx="0.35" cy="0.3" r="0.65">
      <stop offset="0%" stop-color="#1A3050"/>
      <stop offset="100%" stop-color="#060D18"/>
    </radialGradient>
    <radialGradient id="coreGlow">
      <stop offset="0%" stop-color="#4DF0FF"/>
      <stop offset="60%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00B8D4"/>
    </radialGradient>
    <linearGradient id="sealGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.3"/>
      <stop offset="30%" stop-color="#00E5FF" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#00BCD4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00BCD4" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bgGlow)"/>

  <!-- Container frame with bevel -->
  <rect x="80" y="80" width="352" height="352" rx="40"
        fill="none" stroke="#102030" stroke-width="22"/>
  <rect x="80" y="80" width="352" height="352" rx="40"
        fill="none" stroke="url(#frameBevel)" stroke-width="20"/>

  <!-- Bold cross lines -->
  <line x1="176" y1="256" x2="336" y2="256" stroke="#00BCD4" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="176" x2="256" y2="336" stroke="#00BCD4" stroke-width="10" stroke-linecap="round"/>

  <!-- Connecting lines to corners -->
  <line x1="176" y1="176" x2="176" y2="336" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>
  <line x1="336" y1="176" x2="336" y2="336" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>
  <line x1="176" y1="176" x2="336" y2="176" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>
  <line x1="176" y1="336" x2="336" y2="336" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>

  <!-- 4 corner nodes — bold with depth -->
  <circle cx="176" cy="176" r="20" fill="url(#nodeHL)" stroke="#00BCD4" stroke-width="8"/>
  <circle cx="176" cy="176" r="8" fill="url(#coreGlow)"/>

  <circle cx="336" cy="176" r="20" fill="url(#nodeHL)" stroke="#00BCD4" stroke-width="8"/>
  <circle cx="336" cy="176" r="8" fill="url(#coreGlow)"/>

  <circle cx="176" cy="336" r="20" fill="url(#nodeHL)" stroke="#00BCD4" stroke-width="8"/>
  <circle cx="176" cy="336" r="8" fill="url(#coreGlow)"/>

  <circle cx="336" cy="336" r="20" fill="url(#nodeHL)" stroke="#00BCD4" stroke-width="8"/>
  <circle cx="336" cy="336" r="8" fill="url(#coreGlow)"/>

  <!-- Central hub — large and prominent with depth -->
  <circle cx="256" cy="256" r="32" fill="url(#nodeHL)" stroke="#00E5FF" stroke-width="10"/>
  <circle cx="256" cy="256" r="14" fill="url(#coreGlow)"/>
  <!-- Micro highlight -->
  <circle cx="250" cy="250" r="4" fill="#4DF0FF" opacity="0.2"/>

  <!-- Vault seal accent with gradient -->
  <rect x="192" y="90" width="128" height="10" rx="5" fill="url(#sealGrad)"/>
</svg>
