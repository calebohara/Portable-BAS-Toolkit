<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#0D2137"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Single bold container frame -->
  <rect x="80" y="80" width="352" height="352" rx="40"
        fill="none" stroke="#1B3A5C" stroke-width="20"/>

  <!-- Bold cross lines -->
  <line x1="176" y1="256" x2="336" y2="256" stroke="#00BCD4" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="176" x2="256" y2="336" stroke="#00BCD4" stroke-width="10" stroke-linecap="round"/>

  <!-- 4 corner nodes — bold -->
  <circle cx="176" cy="176" r="20" fill="#0A1628" stroke="#00BCD4" stroke-width="8"/>
  <circle cx="176" cy="176" r="8" fill="#00E5FF"/>

  <circle cx="336" cy="176" r="20" fill="#0A1628" stroke="#00BCD4" stroke-width="8"/>
  <circle cx="336" cy="176" r="8" fill="#00E5FF"/>

  <circle cx="176" cy="336" r="20" fill="#0A1628" stroke="#00BCD4" stroke-width="8"/>
  <circle cx="176" cy="336" r="8" fill="#00E5FF"/>

  <circle cx="336" cy="336" r="20" fill="#0A1628" stroke="#00BCD4" stroke-width="8"/>
  <circle cx="336" cy="336" r="8" fill="#00E5FF"/>

  <!-- Connecting lines to corners -->
  <line x1="176" y1="176" x2="176" y2="336" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>
  <line x1="336" y1="176" x2="336" y2="336" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>
  <line x1="176" y1="176" x2="336" y2="176" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>
  <line x1="176" y1="336" x2="336" y2="336" stroke="#00BCD4" stroke-width="6" stroke-linecap="round"/>

  <!-- Central hub — large and prominent -->
  <circle cx="256" cy="256" r="32" fill="#0A1628" stroke="#00E5FF" stroke-width="10"/>
  <circle cx="256" cy="256" r="14" fill="#00E5FF"/>

  <!-- Vault seal accent -->
  <rect x="192" y="90" width="128" height="10" rx="5" fill="#00E5FF" opacity="0.7"/>
</svg>
